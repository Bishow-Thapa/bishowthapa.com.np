    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>

        .navbar-brand {
            font-size: 1.8em;
            font-weight: bold;
        }

        .nav-link {
            text-transform: uppercase;
            font-weight: bold;
        }

        .nav-link.active {
            position: relative;
        }

        .nav-link.active::before {
            content: "";
            position: absolute;
            height: 3px;
            border-radius: 24px;
            /* width: 50%; */
            width: 36px;
            bottom: 0;
            background-color: black;
        }

        /***********************************************************************/
        /* Main */
        /***********************************************************************/
        
        main {
            padding: 6rem 0;
            background: aliceblue;
        }

        .hero-title {
            text-transform: uppercase;
        }

        .hero-section {
            display: flex;
            justify-content: center;
            flex-direction: column;
            height: 100%;
        }

        .hero-description {
            font-size: 2em;
            font-weight: bold;
        }

        .main-section {
            display: flex;
            justify-content: center;
        }

        .main-pad {
            padding: 0 4em;
        }

        .main-img-wrapper {
            height: 300px;
            width: 300px;
        }

        .main-img {
            object-fit: cover;
            border-radius: 50%;
        }

        .hero-btn {
            height: 44px;
            width: 132px;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 4px;
            background-color: #ffae19;
        }
    </style>

                            <div class="collapse navbar-collapse justify-content-end" id="navbarcontent">
                                <ul class="navbar-nav">
                                    <li class="nav-item">

            <div class="row main-pad">
